<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m's collectables ツール一覧</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;
  background:#0f1f35;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 16px;
  color:#fff;
}

/* 背景装飾 */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(42,100,150,.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(26,92,46,.2) 0%, transparent 60%);
  pointer-events:none;
}

.logo{
  font-size:13px;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin-bottom:10px;
  font-weight:500;
}
h1{
  font-size:clamp(22px,5vw,32px);
  font-weight:900;
  letter-spacing:-.01em;
  margin-bottom:8px;
  text-align:center;
}
.sub{
  font-size:12px;
  color:rgba(255,255,255,.4);
  margin-bottom:48px;
  text-align:center;
}

.cards{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  max-width:480px;
}

.card{
  display:flex;
  align-items:center;
  gap:20px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:22px 24px;
  text-decoration:none;
  color:#fff;
  cursor:pointer;
  transition:all .2s ease;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;inset:0;
  opacity:0;
  transition:opacity .2s;
}
.card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);
  box-shadow:0 12px 40px rgba(0,0,0,.3);
}
.card:hover::before{ opacity:1; }
.card:active{ transform:translateY(0); }

.card-1::before{ background:radial-gradient(circle at 0% 50%, rgba(42,100,150,.3), transparent 70%); }
.card-2::before{ background:radial-gradient(circle at 0% 50%, rgba(255,102,0,.15), transparent 70%); }
.card-3::before{ background:radial-gradient(circle at 0% 50%, rgba(26,92,46,.3), transparent 70%); }

.icon{
  font-size:32px;
  width:52px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  flex-shrink:0;
}
.icon-1{ background:rgba(42,100,150,.3); }
.icon-2{ background:rgba(255,102,0,.2); }
.icon-3{ background:rgba(26,92,46,.3); }

.card-text{ flex:1; }
.card-title{
  font-size:16px;
  font-weight:800;
  margin-bottom:4px;
  letter-spacing:-.01em;
}
.card-desc{
  font-size:12px;
  color:rgba(255,255,255,.5);
  line-height:1.6;
}

.arrow{
  font-size:18px;
  color:rgba(255,255,255,.25);
  flex-shrink:0;
  transition:all .2s;
}
.card:hover .arrow{
  color:rgba(255,255,255,.6);
  transform:translateX(3px);
}

.note{
  margin-top:40px;
  font-size:11px;
  color:rgba(255,255,255,.2);
  text-align:center;
  line-height:1.8;
}

/* アニメーション */
.logo,.h1-wrap,.cards,.note{ animation:fadeUp .5s ease both; }
.logo{ animation-delay:.05s }
.h1-wrap{ animation-delay:.1s }
.cards{ animation-delay:.18s }
.note{ animation-delay:.28s }
@keyframes fadeUp{
  from{ opacity:0; transform:translateY(16px); }
  to{ opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="logo">m's collectables</div>
<div class="h1-wrap">
  <h1>業務ツール</h1>
  <div class="sub">使いたいツールを選んでください</div>
</div>

<div class="cards">

  <a class="card card-1" href="product-master.html">
    <div class="icon icon-1">📦</div>
    <div class="card-text">
      <div class="card-title">商品マスタ管理</div>
      <div class="card-desc">商品登録・編集 / バーコード振り直し<br>ラベルCSV出力 / Airレジ上書きインポート</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="card card-2" href="air-csv-converter.html">
    <div class="icon icon-2">🏷️</div>
    <div class="card-text">
      <div class="card-title">Airレジ CSV統合ツール</div>
      <div class="card-desc">商品マスタCSV → Airレジ用CSV変換<br>カテゴリー設定 / 重複チェック</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="card card-3" href="inventory.html">
    <div class="icon icon-3">📋</div>
    <div class="card-text">
      <div class="card-title">棚卸システム</div>
      <div class="card-desc">棚卸入力・集計 / Firebase同期<br>CSV出力</div>
    </div>
    <div class="arrow">›</div>
  </a>

</div>

<div class="note">
  ※ 各ファイルは同じフォルダに置いてください
</div>

</body>
</html>
